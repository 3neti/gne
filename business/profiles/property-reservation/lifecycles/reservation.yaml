  - application_accepted
  - assessment_completed
  - invoice_accepted
  - payment_evidence_submitted
  - payment_reviewed
  - payment_approved
  - receipt_accepted
  - reservation_certified
transitions:
  - { from: brochure_available, to: application_accepted, evidence: Application }
  - { from: application_accepted, to: assessment_completed, evidence: Assessment }
  - { from: assessment_completed, to: invoice_accepted, evidence: Invoice }
